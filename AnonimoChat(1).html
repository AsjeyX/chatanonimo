<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnonimoChat - Chat Anónimo Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* TEMA OSCURO PROFESIONAL */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f1a;
            --bg-tertiary: #151520;
            --bg-card: rgba(20, 20, 30, 0.95);
            --bg-input: rgba(30, 30, 45, 0.9);
            --border-color: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(255, 215, 0, 0.2);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #666;
            --accent-gold: #FFD700;
            --accent-gold-dark: #DAA520;
            --accent-glow: rgba(255, 215, 0, 0.3);
            --gradient-gold: linear-gradient(135deg, #FFD700, #DAA520, #B8860B);
            --gradient-dark: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 5px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        body {
            background: var(--gradient-dark);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Login Container */
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        /* Logo con efecto suave */
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .premium-title {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FFD700, #FFF8DC, #FFD700, #DAA520, #FFD700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: gentleBreathing 4s ease-in-out infinite, textGlow 3s ease-in-out infinite;
        }

        @keyframes gentleBreathing {
            0%, 100% { transform: scale(1); letter-spacing: 4px; }
            50% { transform: scale(1.02); letter-spacing: 6px; }
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }

        @keyframes fadeOutSlow {
            0% { opacity: 1; transform: translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: translateY(30px); filter: blur(10px); visibility: hidden; }
        }

        @keyframes fadeInSlowReverse {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); visibility: hidden; }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); visibility: visible; }
        }

        .premium-title.fade-out { animation: fadeOutSlow 1.5s ease forwards; }
        .premium-title.fade-in { animation: fadeInSlowReverse 1.5s ease forwards; }

        /* Tarjeta de login */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: clamp(30px, 6vw, 50px) clamp(20px, 5vw, 40px);
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-glow);
            border: 1px solid var(--border-glow);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: var(--accent-gold);
            letter-spacing: 2px;
        }

        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Avatar section */
        .avatar-section { margin-bottom: 25px; }
        .avatar-section label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
        }
        .avatar-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .avatar-preview-container {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            cursor: pointer;
        }
        #avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid var(--accent-gold);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }
        #avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .btn-premium {
            background: linear-gradient(135deg, #FFD700, #DAA520);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }
        #avatar-input { display: none; }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--gradient-gold);
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            position: relative;
        }

        .chat-header {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            gap: 8px;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-gold);
            cursor: pointer;
            flex-shrink: 0;
        }
        .user-nick {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-icon {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-primary);
            min-width: 38px;
        }
        .radio-player {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,215,0,0.1);
            padding: 4px 8px;
            border-radius: 25px;
        }
        .radio-player span { font-size: 0.65rem; color: var(--accent-gold); }
        .radio-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 3px;
            color: white;
        }
        .radio-status {
            font-size: 0.55rem;
        }

        .chat-main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            width: 100%;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        /* Mensaje de bienvenida fijo */
        .message.welcome-fixed {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
            text-align: center;
            max-width: 100%;
            color: var(--accent-gold);
            font-size: 0.85rem;
            padding: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            animation: glowPulse 2s ease-in-out infinite;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
        }

        .message.welcome-fixed .stars {
            font-size: 1rem;
            letter-spacing: 4px;
        }

        /* Mensaje del administrador - estilo profesional y suave */
        .message.admin-message {
            background: rgba(255,215,0,0.08);
            text-align: left;
            max-width: 80%;
            border-left: 3px solid var(--accent-gold);
            font-family: 'SF Mono', 'Monaco', 'Cascadia Code', monospace;
            letter-spacing: 0.3px;
            line-height: 1.4;
        }
        .message.admin-message .username {
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 0.75rem;
            font-family: inherit;
        }
        .message.admin-message p {
            color: var(--text-primary);
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* Video call modal */
        .video-call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent-gold);
        }
        .remote-video {
            width: 100%;
            background: #1a1a2e;
            min-height: 300px;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            border-radius: 10px;
            border: 2px solid var(--accent-gold);
            background: #000;
        }
        .video-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .video-controls button {
            width: auto;
            padding: 12px 24px;
            border-radius: 30px;
            background: var(--gradient-gold);
            color: #1a1a2e;
            font-weight: bold;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            animation: fadeInMsg 0.3s;
            word-wrap: break-word;
        }
        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            align-self: flex-end;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .message.other {
            background: var(--bg-tertiary);
            align-self: flex-start;
            border: 1px solid var(--border-color);
        }
        .message .username {
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .message .time {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-left: 8px;
        }
        .message p { font-size: 0.85rem; }
        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
        }

        .message-input {
            display: flex;
            padding: 10px 12px;
            background: var(--bg-secondary);
            gap: 8px;
            border-top: 1px solid var(--border-glow);
            flex-shrink: 0;
        }
        .message-input input {
            flex: 1;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-glow);
            border-radius: 28px;
            color: white;
            font-size: 0.9rem;
            min-width: 0;
        }
        .message-input input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }
        .message-input button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-gold);
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* PANEL DE USUARIOS MÁS ESTRECHO */
        .users-panel {
            position: fixed;
            right: -220px;
            top: 0;
            width: 220px;
            height: 100vh;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-glow);
            transition: right 0.3s ease;
            z-index: 20;
            display: flex;
            flex-direction: column;
        }
        .users-panel.open { right: 0; }

        .users-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .users-header h3 { font-size: 0.85rem; color: var(--accent-gold); }
        .close-users-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
        }
        .user-item:hover { background: rgba(255,215,0,0.1); transform: translateX(-3px); }
        .user-avatar-list {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,215,0,0.5);
            cursor: pointer;
            flex-shrink: 0;
        }
        .user-info-list { flex: 1; min-width: 0; }
        .user-name-list {
            font-weight: 600;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-status { font-size: 0.55rem; color: #44ff44; }
        .vigilante-star {
            color: var(--accent-gold);
            font-size: 0.7rem;
            margin-left: 2px;
        }
        .video-call-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 4px;
            padding: 3px 6px;
            border-radius: 15px;
            background: rgba(255,215,0,0.2);
        }

        .swipe-indicator {
            position: fixed;
            right: 3px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 50px;
            background: rgba(255,215,0,0.5);
            border-radius: 2px;
            cursor: pointer;
            z-index: 15;
        }
        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 19;
            display: none;
        }
        .panel-overlay.show { display: block; }

        .modal-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .modal-photo img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            border: 3px solid var(--accent-gold);
        }

        /* Admin Panel Flotante */
        .admin-panel-floating {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 2px solid var(--accent-gold);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
            box-shadow: var(--shadow-lg);
        }
        .admin-panel-floating h3 {
            color: var(--accent-gold);
            margin-bottom: 15px;
            text-align: center;
        }
        .admin-panel-floating .admin-section {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .admin-panel-floating input, .admin-panel-floating select, .admin-panel-floating textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: var(--bg-input);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            color: white;
        }
        .admin-panel-floating button {
            background: var(--gradient-gold);
            border: none;
            padding: 10px;
            border-radius: 15px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        .close-admin-panel {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            width: auto;
        }
        .user-list-admin {
            max-height: 200px;
            overflow-y: auto;
        }
        .user-admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .radio-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 350px;
            overflow-y: auto;
        }
        .radio-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .radio-option:hover { background: rgba(255,215,0,0.2); }
        .radio-option.selected {
            background: rgba(255,215,0,0.3);
            border: 1px solid var(--accent-gold);
        }
        .radio-category {
            font-weight: bold;
            color: var(--accent-gold);
            margin: 10px 0 5px 0;
            font-size: 0.8rem;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        @media (max-width: 480px) {
            .message-input { padding: 8px 10px; gap: 6px; }
            .message-input input { padding: 10px 12px; font-size: 0.85rem; }
            .message-input button { width: 40px; height: 40px; font-size: 1rem; }
            .btn-icon { padding: 6px 8px; font-size: 0.9rem; min-width: 34px; }
            .user-avatar-small { width: 34px; height: 34px; }
            .user-nick { font-size: 0.8rem; }
            .radio-player span { display: none; }
            .radio-player { padding: 3px 6px; }
            .message { max-width: 85%; padding: 8px 12px; }
            .message p { font-size: 0.8rem; }
            .message.welcome-fixed { font-size: 0.7rem; }
            .local-video { width: 80px; }
            .users-panel { width: 200px; right: -200px; }
            .user-avatar-list { width: 32px; height: 32px; }
            .user-name-list { font-size: 0.7rem; }
            .radio-option { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ANONIMOCHAT PREMIUM - CON LOCA FM AÑADIDA
        let currentUser = { nick: '', avatar: null, color: '', isAdmin: false, isVigilante: false };
        let currentChat = 'global';
        let usersPanelOpen = false;
        let radioAudio = null;
        let radioPlaying = false;
        let titleInterval = null;
        let adminPanelOpen = false;
        let radioOff = false;
        
        // LISTA DE EMISORAS VERIFICADAS - CON LOCA FM
        const radioStations = [
            // 🇪🇸 ESPAÑOLA / FLAMENCO
            { name: "🇪🇸 Radiolé", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/RADIOLE.mp3", category: "🇪🇸 ESPAÑOLA / FLAMENCO" },
            
            // 🎶 POP / ÉXITOS
            { name: "🎵 LOS40 Principales", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3", category: "🎶 POP / ÉXITOS" },
            { name: "🎶 LOS40 Classic", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40_CLASSIC.mp3", category: "🎶 POP / ÉXITOS" },

                let users = JSON.parse(localStorage.getItem('active_users') || '[]');
                if (!users.find(u => u.nick === nick)) users.push({ nick, color: currentUser.color, avatar: currentUser.avatar, lastSeen: Date.now(), isAdmin: false });
                localStorage.setItem('active_users', JSON.stringify(users));
                showChat();
            };
        }

        function showChat() {
            stopTitleAnimation();
            initRadio();
            saveFixedWelcomeMessage();
            
            document.getElementById('app').innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <div class="user-info">
                            <img class="user-avatar-small" src="${currentUser.avatar}" onclick="showFullImage('${currentUser.avatar}')">
                            <span class="user-nick" style="color: ${currentUser.color}">${escapeHtml(currentUser.nick)}${currentUser.isVigilante ? ' ⭐' : ''}</span>
                        </div>
                        <div class="header-buttons">
                            <div class="radio-player"><span>📻</span><button class="radio-btn" id="radio-toggle-btn">▶️</button><span class="radio-status" id="radio-status">⚪</span></div>
                            ${currentUser.isAdmin ? '<button class="btn-icon" id="admin-panel-btn">👑</button>' : ''}
                            <button class="btn-icon" id="toggle-users-btn">👥</button>
                            <button class="btn-icon" id="logout-btn">🚪</button>
                        </div>
                    </div>
                    <div class="chat-main">
                        <div class="chat-area" id="chat-area">
                            <div class="messages-area" id="messages-area">
                                <div class="message system">✨ Conectando al chat anónimo...</div>
                            </div>
                            <div class="message-input">
                                <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                                <button id="send-image" class="btn-icon" title="Imagen">📷</button>
                                <button id="send-video" class="btn-icon" title="Video">🎥</button>
                                <button id="send-message" style="width: auto; padding: 0 18px; border-radius: 28px;">Enviar</button>
                            </div>
                        </div>
                    </div>
                    <div class="swipe-indicator" id="swipe-indicator"></div>
                    <div class="users-panel" id="users-panel">
                        <div class="users-header"><h3>✦ CONECTADOS ✦</h3><button class="close-users-btn" id="close-users-btn">✕</button></div>
                        <div class="users-list" id="users-list"></div>
                    </div>
                    <div class="panel-overlay" id="panel-overlay"></div>
                </div>
            `;

            if (currentUser.isAdmin) {
                document.getElementById('admin-panel-btn').onclick = showAdminPanelModal;
            }

            document.getElementById('radio-toggle-btn').onclick = toggleRadio;
            if (!radioOff) {
                setTimeout(() => startRadio(), 500);
            } else {
                updateRadioUI();
            }

            const usersPanel = document.getElementById('users-panel');
            const overlay = document.getElementById('panel-overlay');

            function openPanel() { usersPanel.classList.add('open'); overlay.classList.add('show'); usersPanelOpen = true; }
            function closePanel() { usersPanel.classList.remove('open'); overlay.classList.remove('show'); usersPanelOpen = false; }
            
            document.getElementById('toggle-users-btn').onclick = () => usersPanelOpen ? closePanel() : openPanel();
            document.getElementById('close-users-btn').onclick = closePanel;
            overlay.onclick = closePanel;
            document.getElementById('swipe-indicator').onclick = () => usersPanelOpen ? closePanel() : openPanel();

            let touchStartX = 0;
            const chatArea = document.getElementById('chat-area');
            chatArea.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
            chatArea.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].screenX - touchStartX;
                if (diff < -40 && !usersPanelOpen) openPanel();
                else if (diff > 40 && usersPanelOpen) closePanel();
            });

            loadMessages();
            updateUsers();

            document.getElementById('send-message').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            document.getElementById('send-image').onclick = () => sendFile('image');
            document.getElementById('send-video').onclick = () => sendFile('video');
            document.getElementById('logout-btn').onclick = logout;

            setInterval(() => { updateUsers(); loadMessages(); }, 2000);
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            const msg = { id: Date.now(), type: 'text', content: text, sender: currentUser.nick, senderColor: currentUser.color, timestamp: new Date().toLocaleTimeString(), chat: currentChat };
            saveMessage(msg);
            displayMessage(msg);
            input.value = '';
        }

        function sendFile(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = type === 'image' ? 'image/*' : 'video/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file && file.size < 30 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const msg = { id: Date.now(), type: type, content: e.target.result, sender: currentUser.nick, senderColor: currentUser.color, timestamp: new Date().toLocaleTimeString(), chat: currentChat };
                        saveMessage(msg);
                        displayMessage(msg);
                    };
                    reader.readAsDataURL(file);
                } else alert('Archivo grande (máx 30MB)');
            };
            input.click();
        }

        function displayMessage(msg) {
            const area = document.getElementById('messages-area');
            if (!area) return;
            
            const div = document.createElement('div');
            
            if (msg.type === 'welcome_fixed') {
                div.className = 'message welcome-fixed';
                div.innerHTML = `<div class="stars">✨🌟⭐✨</div><p>${msg.content}</p><div class="stars">✨⭐🌟✨</div>`;
                div.setAttribute('data-id', msg.id);
            } else if (msg.type === 'admin') {
                div.className = 'message admin-message';
                div.innerHTML = `<div><span class="username" style="color:${msg.senderColor}">${msg.sender}</span><span class="time">${msg.timestamp}</span></div><p>${escapeHtml(msg.content)}</p>`;
            } else if (msg.type === 'system') {
                return;
            } else {
                if (msg.chat !== currentChat && msg.chat !== 'global') return;
                div.className = `message ${msg.sender === currentUser.nick ? 'own' : 'other'}`;
                let content = '';
                if (msg.type === 'text') content = `<p>${escapeHtml(msg.content)}</p>`;
                else if (msg.type === 'image') content = `<img src="${msg.content}" onclick="window.open(this.src)">`;
                else if (msg.type === 'video') content = `<video controls src="${msg.content}"></video>`;
                div.innerHTML = `<div><span class="username" style="color:${msg.senderColor}">${escapeHtml(msg.sender)}${vigilantes.includes(msg.sender) ? ' ⭐' : ''}</span><span class="time">${msg.timestamp}</span></div>${content}`;
            }
            
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            const area = document.getElementById('messages-area');
            if (!area) return;
            
            const fixedMsg = messages.find(m => m.type === 'welcome_fixed');
            const otherMsgs = messages.filter(m => m.type !== 'welcome_fixed' && m.type !== 'system').sort((a,b) => a.id - b.id);
            const filtered = [...(fixedMsg ? [fixedMsg] : []), ...otherMsgs.filter(m => m.chat === 'global' || m.chat === currentChat)];
            
            const currentIds = Array.from(area.children).map(c => c.getAttribute('data-id'));
            filtered.forEach(msg => {
                if (!currentIds.includes(msg.id.toString())) {
                    const div = document.createElement('div');
                    div.setAttribute('data-id', msg.id);
                    
                    if (msg.type === 'welcome_fixed') {
                        div.className = 'message welcome-fixed';
                        div.innerHTML = `<div class="stars">✨🌟⭐✨</div><p>${msg.content}</p><div class="stars">✨⭐🌟✨</div>`;
                    } else if (msg.type === 'admin') {
                        div.className = 'message admin-message';
                        div.innerHTML = `<div><span class="username" style="color:${msg.senderColor}">${msg.sender}</span><span class="time">${msg.timestamp}</span></div><p>${escapeHtml(msg.content)}</p>`;
                    } else {
                        div.className = `message ${msg.sender === currentUser.nick ? 'own' : 'other'}`;
                        let content = '';
                        if (msg.type === 'text') content = `<p>${escapeHtml(msg.content)}</p>`;
                        else if (msg.type === 'image') content = `<img src="${msg.content}" onclick="window.open(this.src)">`;
                        else if (msg.type === 'video') content = `<video controls src="${msg.content}"></video>`;
                        div.innerHTML = `<div><span class="username" style="color:${msg.senderColor}">${escapeHtml(msg.sender)}${vigilantes.includes(msg.sender) ? ' ⭐' : ''}</span><span class="time">${msg.timestamp}</span></div>${content}`;
                    }
                    area.appendChild(div);
                }
            });
            if (filtered.length) area.scrollTop = area.scrollHeight;
        }

        function updateUsers() {
            let users = JSON.parse(localStorage.getItem('active_users') || '[]');
            const idx = users.findIndex(u => u.nick === currentUser.nick);
            if (idx !== -1) users[idx].lastSeen = Date.now();
            
            let activeUsers = users.filter(u => (Date.now() - (u.lastSeen || 0)) < 10000);
            
            const ghostAdmin = activeUsers.find(u => u.isGhostMode === true);
            if (ghostAdmin && !currentUser.isAdmin) {
                activeUsers = activeUsers.filter(u => !u.isGhostMode);
            }
            
            localStorage.setItem('active_users', JSON.stringify(activeUsers));
            
            const container = document.getElementById('users-list');
            if (container) {
                container.innerHTML = activeUsers.map(u => `
                    <div class="user-item">
                        <img class="user-avatar-list" src="${u.avatar || `https://ui-avatars.com/api/?background=${u.color.replace('#', '')}&color=fff&bold=true&name=${u.nick.charAt(0)}`}" onclick="event.stopPropagation(); showFullImage('${u.avatar || `https://ui-avatars.com/api/?background=${u.color.replace('#', '')}&color=fff&bold=true&name=${u.nick.charAt(0)}`}')">
                        <div class="user-info-list" onclick="startPrivateChat('${u.nick}')">
                            <div class="user-name-list" style="color: ${u.color}">${escapeHtml(u.nick)} ${u.isAdmin ? '👑' : ''} ${vigilantes.includes(u.nick) ? '<span class="vigilante-star">⭐</span>' : ''}</div>
                            <div class="user-status">● Conectado</div>
                        </div>
                        ${!u.isAdmin && u.nick !== currentUser.nick ? `<button class="video-call-btn" onclick="event.stopPropagation(); startVideoCall('${u.nick}')">🎥</button>` : ''}
                    </div>
                `).join('');
            }
        }

        window.startPrivateChat = function(nick) {
            if (nick === currentUser.nick) return;
            currentChat = nick;
            const area = document.getElementById('messages-area');
            if (area) area.innerHTML = `<div class="message system">💬 Chat privado con ${escapeHtml(nick)}</div>`;
            loadMessages();
            document.getElementById('users-panel').classList.remove('open');
            document.getElementById('panel-overlay').classList.remove('show');
            usersPanelOpen = false;
        };

        // Funciones globales para el panel
        window.toggleVigilante = toggleVigilante;
        window.banUserByName = function(nick) {
            const reason = prompt("Motivo del ban (opcional):", "Comportamiento inapropiado");
            if (confirm(`¿Banear permanentemente a "${nick}"?`)) {
                banUserByNick(nick, reason || "Ban por administrador");
                alert(`${nick} ha sido baneado`);
                if (adminPanelOpen) {
                    document.querySelector('.admin-panel-floating')?.remove();
                    adminPanelOpen = false;
                    showAdminPanelModal();
                }
            }
        };
        window.unbanUserByName = function(nick) {
            if (confirm(`¿Desbanear a "${nick}"?`)) {
                unbanUserByNick(nick);
                alert(`${nick} ha sido desbaneado`);
                if (adminPanelOpen) {
                    document.querySelector('.admin-panel-floating')?.remove();
                    adminPanelOpen = false;
                    showAdminPanelModal();
                }
            }
        };
        window.startVideoCall = startVideoCall;

        function logout() {
            if (radioAudio) radioAudio.pause();
            let users = JSON.parse(localStorage.getItem('active_users') || '[]');
            users = users.filter(u => u.nick !== currentUser.nick);
            localStorage.setItem('active_users', JSON.stringify(users));
            showLogin();
        }

        setInterval(() => {
            if (currentUser.nick) {
                let users = JSON.parse(localStorage.getItem('active_users') || '[]');
                const idx = users.findIndex(u => u.nick === currentUser.nick);
                if (idx !== -1) users[idx].lastSeen = Date.now();
                localStorage.setItem('active_users', JSON.stringify(users));
            }
        }, 3000);

        showLogin();
    </script>
</body>
</html>
